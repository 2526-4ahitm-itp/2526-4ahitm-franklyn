info:
  name: get exam
  type: graphql
  seq: 1

graphql:
  method: POST
  url: "{{BASE_URL}}/api/graphql"
  body:
    query: |
      query GetExams {
        exams {
          teacherId
          startTime
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
