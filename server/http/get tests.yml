info:
  name: get tests
  type: graphql
  seq: 1

graphql:
  method: POST
  url: http://localhost:5050/api/graphql
  body:
    query: |
      query GetTests {
        tests {
          teacherId
          startTime
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
