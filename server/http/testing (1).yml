info:
  name: testing (1)
  type: graphql
  seq: 2

graphql:
  method: POST
  url: http://localhost:5050/api/graphql
  body:
    query: |-
      mutation CreateTest {
        createTest(test: {
          teacherId: 0,
          testAccountPrefix: "asd",
          startTime: "2026-03-06T19:46:28+00:00",
          endTime: "2026-03-06T20:46:28+00:00",
          title: "hello",
        }) {
          title,
          id,
          teacherId,
          startTime,
          endTime,
          testAccountPrefix
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
