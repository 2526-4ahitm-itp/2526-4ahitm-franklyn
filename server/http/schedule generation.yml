info:
  name: schedule generation
  type: graphql
  seq: 21

graphql:
  method: POST
  url: "{{BASE_URL}}/api/graphql"
  body:
    query: |-
      mutation generateVideo {
        generateSentinelVideo (sentinelId: "3c1202de-d9c8-4b3d-a2d2-b1f5746b10e0")
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
