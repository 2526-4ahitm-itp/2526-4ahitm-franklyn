opencollection: 1.0.0

info:
  name: franklyn
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ""
      port: ""
      auth:
        username: ""
        password: ""
      bypassProxy: ""

request:
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: "{{KLC_URL}}/protocol/openid-connect/token"
    credentials:
      clientId: franklyn-testing
      placement: basic_auth_header
    resourceOwner:
      username: srv-teacher
      password: "123"
    scope: openid
    tokenConfig:
      id: access_token
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: true
      autoRefreshToken: true
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
