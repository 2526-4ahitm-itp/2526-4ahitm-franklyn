quarkus.package.jar.type=uber-jar

# OIDC Configuration
quarkus.oidc.enabled=true
quarkus.oidc.auth-server-url=${KEYCLOAK_URL}
quarkus.oidc.client-id=${KEYCLOAK_CLIENT_ID:backend}
quarkus.oidc.application-type=service

# JWT verification settings
mp.jwt.verify.issuer=${KEYCLOAK_URL}
mp.jwt.verify.publickey.location=${KEYCLOAK_URL}/protocol/openid-connect/certs

quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME}
quarkus.datasource.password=${DB_PASSWORD}
quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/db
quarkus.datasource.jdbc.leak-detection-interval=10M

quarkus.websockets-next.server.supported-subprotocols=bearer-token-carrier
quarkus.websockets-next.server.propagate-subprotocol-headers=true

# quarkus.devservices.enabled=false
quarkus.http.root-path=/api

# HTTP configuration
quarkus.http.port=5050
%prod.quarkus.http.port=8080

# Disable built-in compression
quarkus.http.enable-compression=false

# Allow messages up to 10mb
quarkus.websockets-next.server.max-frame-size=10485760
quarkus.websockets-next.server.max-message-size=10485760

# Quarkus tests should not fail if 8081 is taken (e.g. parallel Maven runs)
%test.quarkus.http.test-port=0
%test.quarkus.http.test-ssl-port=0

# # CORS configuration
# %dev.quarkus.http.cors.enabled=true
# %dev.quarkus.http.cors.origins=*
# quarkus.http.cors.methods=GET,POST,OPTIONS
# quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with

# # Auth: require authenticated for all paths (relative to root-path /api)
quarkus.http.auth.permission.authenticated.paths=/api/*
quarkus.http.auth.permission.authenticated.policy=authenticated

# # Auth: exclude WebSocket endpoints from authentication
quarkus.http.auth.permission.ws.paths=/api/ws/*
quarkus.http.auth.permission.ws.policy=permit

# # Auth: exclude health endpoints from authentication
%dev.quarkus.http.auth.permission.q.paths=/api/q/*,/api/graphql/schema.graphql
%dev.quarkus.http.auth.permission.q.policy=permit

quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
%dev.quarkus.flyway.repair-at-start=true
%test.quarkus.flyway.clean-at-start=true

mp.graphql.showErrorMessage=at.ac.htlleonding.franklynserver.resource.error.*
smallrye.graphql.errorExtensionFields=exception,classification,code,description,validationErrorType,queryPath

# PIN Generation Configuration
franklyn.pin.min=${FRANKLYN_PIN_RANGE_MIN:1337}
franklyn.pin.max=${FRANKLYN_PIN_RANGE_MAX:4200}

# Video Storage Configuration
franklyn.video.storage-dir=${FRANKLYN_VIDEO_STORAGE_DIR:/var/lib/franklyn}

# Video generation debug logging
quarkus.log.category."at.ac.htlleonding.franklynserver.service.VideoService".level=DEBUG
