
x-environment: &default-environment
  DATABASE_URL: postgres://postgres:${GLITCHTIP_POSTGRES_PASSWORD}@glitchtip-postgres:5432/postgres
  VALKEY_URL: redis://glitchtip-valkey:6379
  SECRET_KEY: ${GLITCHTIP_SECRET_KEY} # best to run openssl rand -hex 32
  EMAIL_URL: consolemail:// # Example smtp://email:password@smtp_url:port https://glitchtip.com/documentation/install#configuration
  GLITCHTIP_DOMAIN: https://franklyn.htl-leonding.ac.at # Change this to your domain
  DEFAULT_FROM_EMAIL: franklyn@htl-leonding.ac.at # Change this to your email
  ENABLE_ADMIN: "False" # Set to True to enable Django Admin at /admin/
  ENABLE_OPENAPI: "False" # Set to True to enable OpenAPI spec at /api/docs
  GLITCHTIP_ENABLE_MCP: "False" # Set to True to enable MCP server
  GLITCHTIP_ENABLE_DUCKDB: "False" # Set to True to enable cold storage archival
  BASE_PATH: /glitchtip
  ENABLE_OPEN_USER_REGISTRATION: False
  ENABLE_ORGANIZATION_CREATION: False
  # PORT: 8000 # If changing, change the web service port too

  ## To reduce RAM usage (targeting 256-512 MB), consider disabling:
  # VALKEY_URL: "" # Disable Valkey, use Postgres for task queue and cache
  # GLITCHTIP_ENABLE_LOGS: "False" # Disable log ingestion
  # GLITCHTIP_ENABLE_UPTIME: "False" # Disable uptime monitoring

x-depends_on: &default-depends_on
  - glitchtip-postgres
  - glitchtip-valkey # Remove when disabling Valkey

services:

  glitchtip-postgres:
    image: postgres:18-alpine
    container_name: glitchtip-postgres
    environment:
      POSTGRES_PASSWORD: ${GLITCHTIP_POSTGRES_PASSWORD}
    networks:
      - franklyn
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - glitchtip-pg-data:/var/lib/postgresql

  glitchtip-valkey:
    image: valkey/valkey:9
    networks:
      - franklyn
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  glitchtip-web:
    container_name: glitchtip-web
    image: glitchtip/glitchtip:6 # Check https://glitchtip.com/blog/ for new major versions
    environment:
      <<: *default-environment
      SERVER_ROLE: all_in_one
    depends_on: *default-depends_on
    volumes:
      - glitchtip-uploads:/code/uploads
    networks:
      - franklyn

volumes:
  glitchtip-pg-data:
  glitchtip-uploads:
