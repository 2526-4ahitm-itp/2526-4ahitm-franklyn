version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/bufbuild/buf-examples/gen
plugins:
  - local: protoc-gen-prost
    out: gen/rust/src
    opt:
      - bytes=.
      - file_descriptor_set
  
  - local: protoc-gen-prost-crate
    out: gen/rust
    strategy: all
    opt:
      - gen_crate=../sentinel/Cargo.toml
      - no_features
