edition = "proto3";

package franklyn.ws.v2;

import "common.proto";
import "sentinel.proto";
import "proctor.proto";

message CommonPayload {
  oneof playload {
    Pong pong = 2;
    Ping ping = 1;
  };
}

message CommonClientPayload {
  oneof payload {
    AuthReq auth_req = 1;
  }
}

message CommonServerPayload {
  oneof payload {
    AuthAck auth_ack = 1;
    AuthReject auth_reject = 2;
    AgreedCapabilities agreed_capabilities = 3;
  }
}

message ServerToSentinel {
  google.protobuf.Timestamp timestamp = 1;  

  oneof payload {
    CommonServerPayload common = 2;
  }
}

message ServerToProctor {
  google.protobuf.Timestamp timestamp = 1;  

  oneof payload {
    CommonPayload common = 2;
  }
}

message ProctorToServer {
  google.protobuf.Timestamp timestamp = 1;  

  oneof payload {
    CommonPayload common = 2;
  }
}

message SentinelToServer {
  google.protobuf.Timestamp timestamp = 1;  

  oneof payload {
    CommonPayload common = 2;
  }
}
