
// Common messages

message UUID {
  string value = 1;
}

message Ping {
  uint64 nonce = 1;
}

message Pong {
  uint64 nonce = 1;
}

message Capabilities {
  repeated string capabilities = 1;
}

// Session creation

message AuthReq {
  string jwt = 1;
}

message AuthAck {
  UUID clientId = 1;
}

message AuthReject {
  uint32 code = 1;
  string reason = 2;
}

message TelemetryCapabilities {
  string version = 1;
  Capabilities capabilities = 2;
}

message AgreedCapabilities {
  Capabilities capabilities = 1;
}
