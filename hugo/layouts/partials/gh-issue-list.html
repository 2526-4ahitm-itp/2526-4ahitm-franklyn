{{/*
  Renders a comma-separated list of GitHub issue links.

  Input: a string of ids, e.g. "142,157, 164".
*/}}

{{- $ids := split . "," -}}
{{- range $index, $id := $ids -}}
  {{- $id = trim $id " " -}}
  {{- partial "gh-issue.html" $id -}}
  {{- if lt (add $index 1) (len $ids) -}}, {{- end -}}
{{- end -}}
