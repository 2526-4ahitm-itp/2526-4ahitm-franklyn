name: 🔄 PR Checks

on:
  workflow_dispatch:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read
  checks: write
  pull-requests: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: 🧭 Detect Changed Projects
    runs-on: ubuntu-latest
    outputs:
      proctor: ${{ steps.manual.outputs.proctor || steps.filter.outputs.proctor }}
      server: ${{ steps.manual.outputs.server || steps.filter.outputs.server }}
      sentinel: ${{ steps.manual.outputs.sentinel || steps.filter.outputs.sentinel }}
    steps:
      - name: 🎛️ Manual dispatch run all projects
        id: manual
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          echo "proctor=true" >> "$GITHUB_OUTPUT"
          echo "server=true" >> "$GITHUB_OUTPUT"
          echo "sentinel=true" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v5
        if: ${{ github.event_name != 'workflow_dispatch' }}
        with:
          fetch-depth: 0

      - name: 🔎 Filter paths
        id: filter
        if: ${{ github.event_name != 'workflow_dispatch' }}
        uses: dorny/paths-filter@v3
        with:
          filters: |
            proctor:
              - 'proctor/**'
            server:
              - 'server/**'
            sentinel:
              - 'sentinel/**'

  build-proctor:
    name: 🏗️ Build Proctor
    needs: changes
    if: ${{ needs.changes.outputs.proctor == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: ❄️ Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          environment: proctor
          cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: 🧪 Check Proctor
        run: |
          cd proctor
          nix develop .#proctor --command fr-proctor-pr-check

      - name: 🧾 Report eslint results
        uses: ataylorme/eslint-annotate-action@v3
        if: failure()
        with:
          check-name: 🧹 Lint & 🧪 Test Results
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          report-json: proctor/eslint_report.json

  build-server:
    name: 🏗️ Build Server
    needs: changes
    if: ${{ needs.changes.outputs.server == 'true' }}
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: db
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --health-start-period 10s

    steps:
      - uses: actions/checkout@v5

      - name: ❄️ Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          environment: server
          cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: 🧪 Verify Server
        run: |
          cd server
          nix develop .#server --command fr-server-pr-check

      - name: 📦 Build Server Package
        run: |
          set -euo pipefail
          nix build .#franklyn-server

      - name: 🧾 Report checkstyle results
        uses: jwgmeligmeyling/checkstyle-github-action@v1.2
        if: failure()
        with:
          name: server-pr-check
          title: 🧹 Lint Results
          token: ${{ secrets.GITHUB_TOKEN }}
          path: '**/checkstyle-result.xml'

      - name: 📤 Report Coverage
        uses: codecov/codecov-action@v5
        with:
          directory: server
          name: codecov-server
          flags: server
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true

  build-sentinel:
    name: 🏗️ Build Sentinel
    needs: changes
    if: ${{ needs.changes.outputs.sentinel == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: ❄️ Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          environment: sentinel
          cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: 🧪 Verify Sentinel
        run: |
          nix build .#franklyn-sentinel-check

      - name: 📤 Report Coverage
        uses: codecov/codecov-action@v5
        with:
          directory: result/
          name: codecov-sentinel
          flags: sentinel
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true

  pr-check:
    name: ☑️ Combined PR Check
    needs:
      - changes
      - build-proctor
      - build-server
      - build-sentinel
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Summarize job results
        run: |
          declare -A results=(
            [build-proctor]="${{ needs.build-proctor.result }}"
            [build-server]="${{ needs.build-server.result }}"
            [build-sentinel]="${{ needs.build-sentinel.result }}"
          )

          echo "| Job | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "| --- | --- |" >> "$GITHUB_STEP_SUMMARY"

          failed=0
          for job in "${!results[@]}"; do
            result="${results[$job]:-skipped}"
            echo "| ${job} | ${result} |" >> "$GITHUB_STEP_SUMMARY"
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              failed=1
            fi
          done

          exit $failed