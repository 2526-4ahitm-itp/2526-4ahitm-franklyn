name: 🎉 Release and 🚀 Deploy

on:
  push:
    branches:
      - main
      - ci/deploy-*
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

jobs:
  tag:
    runs-on: ubuntu-latest
    name: 🏷️ Tag & 🔨 Build

    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      channel: ${{ steps.check.outputs.channel }}
      version: ${{ steps.update-tag.outputs.version }}
      docker_version: ${{ steps.update-tag.outputs.docker_version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔍 Check any [{release_type}]
        id: check
        run: |
          COMMIT_MSG=$(git log -1 --format='%s')
          TAG=$(echo "$COMMIT_MSG" | grep -oP '\[\K[^\]]+(?=\])' || true)
          if [[ -z "$TAG" ]]; then
            echo "No version tag found, skipping release"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          case "$TAG" in
            major|minor|patch)
              CHANNEL="stable"
              ;;
            "rc major"|"rc minor"|"rc patch"|rc)
              CHANNEL="dev"
              ;;
            dev)
              CHANNEL="dev"
              ;;
            *)
              echo "::error::Unknown version tag: [$TAG]"
              exit 1
              ;;
          esac
          echo "should_release=true" >> "$GITHUB_OUTPUT"
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"
          echo "franver_args=$TAG" >> "$GITHUB_OUTPUT"

      - name: ❄️ Setup Nix
        uses: ./.github/actions/setup-nix
        if: steps.check.outputs.should_release == 'true'
        with:
          cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: 🏷️ Update from Tag
        id: update-tag
        if: steps.check.outputs.should_release == 'true'
        env:
          FRANVER_ARGS: ${{ steps.check.outputs.franver_args }}
        run: |
          nix develop .#ci --command bash -c '
            set -euo pipefail
            CURRENT_VERSION=$(cat VERSION)

            # word splitting intentional for "rc major" etc
            # shellcheck disable=SC2086
            VERSION=$(./scripts/franver2.sh $FRANVER_ARGS "$CURRENT_VERSION")
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "docker_version=${VERSION//+/-}" >> "$GITHUB_OUTPUT"

            TAG_NAME="v$VERSION"

            echo -n "$VERSION" > VERSION

            if [ -n "$(git tag -l "$TAG_NAME")" ]; then
                echo "Tag ''$TAG_NAME'' already exists."
                exit 1
            fi

            git config --local user.name "GitHub Actions [Bot]"
            git config --local user.email "github-actions[bot]@users.noreply.github.com"

            git add VERSION
            git commit -m "chore: ✨ bump version to ''$VERSION'' [skip ci]"

            git push origin HEAD

            git tag "$TAG_NAME" HEAD
            git push origin "$TAG_NAME"
          '


  build-sentinel:
    name: 🏗️ Build Sentinel (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    if: needs.tag.outputs.should_release == 'true'
    needs: tag
    strategy:
      matrix:
        runner:
          - ubuntu-latest
          - ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: v${{ needs.tag.outputs.version }}

      - name: ❄️ Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          environment: sentinel
          cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: 🏗️ Build Sentinel Tarball
        run: |
          nix build .#franklyn-sentinel-tarball

      - name: 📦 Upload Sentinel Tarball Artifact
        uses: actions/upload-artifact@v5
        with:
          name: franklyn-sentinel-tarball-${{ matrix.runner }}
          path: result/franklyn-sentinel*.tar.xz

      - name: 🏗️ Build Sentinel Debian
        run: |
          nix build .#franklyn-sentinel-deb

      - name: 📦 Upload Sentinel Debian Artifact
        uses: actions/upload-artifact@v5
        with:
          name: franklyn-sentinel-deb-${{ matrix.runner }}
          path: result/franklyn-sentinel*.deb

  build-server:
    name: 🏗️ Build Server
    runs-on: ubuntu-latest
    if: needs.tag.outputs.should_release == 'true'
    needs: tag
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: v${{ needs.tag.outputs.version }}

      - name: ❄️ Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          environment: server
          cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: 🏗️ Build Server
        run: |
          nix build .#franklyn-server

      - name: 📦 Upload Server Artifact
        uses: actions/upload-artifact@v5
        with:
          name: franklyn-server-${{ needs.tag.outputs.version }}
          path: result/lib/franklyn-server-*

  build-proctor:
    name: 🏗️ Build Proctor
    runs-on: ubuntu-latest
    if: needs.tag.outputs.should_release == 'true'
    needs: tag
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: v${{ needs.tag.outputs.version }}

      - name: ❄️ Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          environment: proctor
          cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: 🏗️ Build Proctor
        run: |
          cd proctor
          nix develop .#proctor --command fr-proctor-build --base=/proctor/
          tar -czf ../franklyn-proctor-${{ needs.tag.outputs.version }}.tar.gz -C dist .

      - name: 📦 Upload Proctor Artifact
        uses: actions/upload-artifact@v5
        with:
          name: franklyn-proctor-${{ needs.tag.outputs.version }}
          path: franklyn-proctor-*.tar.gz
          compression-level: 0

  build-and-publish-docker-images:
    runs-on: ubuntu-latest
    name: 🐳 Build & Publish Docker Image
    if: needs.tag.outputs.should_release == 'true'
    needs:
      - tag
      - build-server
      - build-proctor
    permissions:
      packages: write
      attestations: write
      id-token: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository_owner }}/franklyn
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: v${{ needs.tag.outputs.version }}

      - uses: actions/download-artifact@v4
        name: 📦 Download Server Artifact
        with:
          pattern: franklyn-server-*
          path: ./
          merge-multiple: true

      - uses: actions/download-artifact@v4
        name: 📦 Download Proctor Artifact
        with:
          pattern: franklyn-proctor-*
          path: ./
          merge-multiple: true

      - name: 🔑 Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐳 Build and Push Server
        uses: docker/build-push-action@v6
        id: push-server
        with:
          context: .
          file: ./server/src/main/docker/Dockerfile.ci
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-server:${{ needs.tag.outputs.docker_version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-server:dev
            ${{ needs.tag.outputs.channel == 'stable' && format('{0}/{1}-server:latest', env.REGISTRY, env.IMAGE_NAME) || '' }}

      - name: 🔏 Generate Server Artifact Attestation
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-server
          subject-digest: ${{ steps.push-server.outputs.digest }}
          push-to-registry: true

      - name: 🐳 Build and Push Proctor
        uses: docker/build-push-action@v6
        id: push-proctor
        with:
          context: .
          file: ./proctor/docker/Dockerfile.ci
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-proctor:${{ needs.tag.outputs.docker_version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-proctor:dev
            ${{ needs.tag.outputs.channel == 'stable' && format('{0}/{1}-proctor:latest', env.REGISTRY, env.IMAGE_NAME) || '' }}

      - name: 🔏 Generate Proctor Artifact Attestation
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-proctor
          subject-digest: ${{ steps.push-proctor.outputs.digest }}
          push-to-registry: true

  release:
    runs-on: ubuntu-latest
    name: 🎉 Release Artifacts
    if: needs.tag.outputs.should_release == 'true'

    needs:
      - tag
      - build-sentinel
      - build-server
      - build-proctor

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: v${{ needs.tag.outputs.version }}

      - uses: actions/download-artifact@v4
        name: 📦 Download All Artifacts
        with:
          pattern: franklyn-*
          path: artifacts/
          merge-multiple: true

      - name: ✏️ Generate Release Notes (non dev)
        id: notes_generation
        if: ${{ needs.tag.outputs.channel != 'dev' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURRENT_TAG="v${{ needs.tag.outputs.version }}"
          REPO="${{ github.repository }}"

          echo "This is a Main Channel Release ($CURRENT_TAG)."

          git fetch --tags --prune

          PREVIOUS_STABLE_TAG=$(git tag -l "v*" | grep -vE '(-rc\.|\+dev\.|-dev\.)' | sort -V -r | grep -v "^$CURRENT_TAG$" | head -n 1)

          if [ -z "$PREVIOUS_STABLE_TAG" ]; then
            echo "::notice::No previous stable tag found. Notes will be generated from the beginning."
            PREVIOUS_TAG_ARG=""
          else
            echo "Found previous stable tag: $PREVIOUS_STABLE_TAG"
            PREVIOUS_TAG_ARG="-f previous_tag_name=$PREVIOUS_STABLE_TAG"
          fi

          RELEASE_NOTES=$(gh api \
            --method POST \
            /repos/$REPO/releases/generate-notes \
            -f tag_name="$CURRENT_TAG" \
            $PREVIOUS_TAG_ARG \
            --jq '.body')

          echo "notes<<RELEASE_NOTES_EOF" >> "$GITHUB_OUTPUT"
          echo "$RELEASE_NOTES" >> "$GITHUB_OUTPUT"
          echo "RELEASE_NOTES_EOF" >> "$GITHUB_OUTPUT"

      - name: 📝 Draft Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          tag_name: v${{ needs.tag.outputs.version }}
          body: ${{ steps.notes_generation.outputs.notes }}
          generate_release_notes: ${{ needs.tag.outputs.channel == 'dev' }}
          prerelease: ${{ needs.tag.outputs.channel == 'dev' }}
          files: artifacts/*

