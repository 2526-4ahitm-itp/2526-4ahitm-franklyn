name: 🎉 Release and 🚀 Deploy

on:
  push:
    tags:
      - v*

permissions:
  contents: write
  pull-requests: read

jobs:
  tag:
    runs-on: ubuntu-latest
    name: 🏷️ Tag & 🔨 Build

    outputs:
      is_dev: ${{ steps.check.outputs.is_dev }}
      is_lts: ${{ steps.check.outputs.is_lts }}

      # the version that is used and built
      version: ${{ steps.check.outputs.version }}

      # version with a prefixed 'v' and the github tag
      tag: ${{ github.ref_name }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔍 Analyze Git Tag
        id: check
        run: |
          TAG_MESSAGE="$(git tag -l --format='%(contents)' "${{ github.ref_name }}")"
          TAG="${{ github.ref_name }}"
          VERSION="${GITHUB_REF_NAME#v}"

          if [[ "$VERSION" != "$(tr -d '\n' < VERSION)" ]]; then
            echo "Tag '$TAG' is not the same as ./VERSION: '$(tr -d '\n' < VERSION)'"
            exit 1
          fi

          IS_DEV=false
          IS_LTS=false

          [[ "$TAG" == *"+"* || "$TAG" == *"-"* ]] && IS_DEV=true
          [[ "$TAG_MESSAGE" == *"[lts]"* ]] && IS_LTS=true

          echo "is lts: '$IS_LTS'"
          echo "is dev: '$IS_DEV'"
          echo "version: '$VERSION'"
          echo "tag message: '$TAG_MESSAGE'"

          echo "is_dev=$IS_DEV" >> "$GITHUB_OUTPUT"
          echo "is_lts=$IS_LTS" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  build-sentinel:
    name: 🏗️ Build Sentinel (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    needs: tag
    strategy:
      matrix:
        runner:
          - ubuntu-latest
          - ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.tag.outputs.tag }}

      - name: ❄️ Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          environment: sentinel
          cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: 🏗️ Build Sentinel Distributable
        run: |
          nix build .#franklyn-sentinel-dist

      - name: 📦 Upload Sentinel Distributable Artifact
        uses: actions/upload-artifact@v5
        with:
          name: franklyn-sentinel-${{ matrix.runner }}-dist
          path: result/franklyn-sentinel*.tar.zst

      # - name: 🏗️ Build Sentinel Portable
      #   run: |
      #     nix build .#franklyn-sentinel-portable

      # - name: 📦 Upload Sentinel Portable Artifact
      #   uses: actions/upload-artifact@v5
      #   with:
      #     name: franklyn-sentinel-${{ matrix.runner }}-portable
      #     path: result/franklyn-sentinel*.tar.zst

      - name: 🏗️ Build Sentinel Debian
        run: |
          nix build .#franklyn-sentinel-deb

      - name: 📦 Upload Sentinel Debian Artifact
        uses: actions/upload-artifact@v5
        with:
          name: franklyn-sentinel-deb-${{ matrix.runner }}
          path: result/franklyn-sentinel*.deb

  build-sentinel-windows:
    name: 🏗️ Build Sentinel on Windows
    runs-on: windows-2025
    needs: tag
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.tag.outputs.tag }}
          
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.91.1-x86_64-pc-windows-gnu
          cache-directories: ./sentinel/
          cache-all-crates: false
          rust-src-dir: ./sentinel/
          rustflags: ""

      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          path-type: inherit

      - name: 🏗️ Build Sentinel Portable
        run: |
          ./sentinel/packaging/windows/build.sh

      - name: 📦 Upload Sentinel Portable
        uses: actions/upload-artifact@v5
        with:
          name: franklyn-sentinel-portable
          path: franklyn-sentinel-*.zip

  build-server:
    name: 🏗️ Build Server
    runs-on: ubuntu-latest
    needs: tag
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.tag.outputs.tag }}

      - name: ❄️ Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          environment: server
          cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: 🏗️ Build Server
        run: |
          nix build .#franklyn-server

      - name: 📦 Upload Server Artifact
        uses: actions/upload-artifact@v5
        with:
          name: franklyn-server-${{ needs.tag.outputs.version }}
          path: result/lib/franklyn-server-*

  build-proctor:
    name: 🏗️ Build Proctor
    runs-on: ubuntu-latest
    needs: tag
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.tag.outputs.tag }}

      - name: ❄️ Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          environment: proctor
          cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: 🏗️ Build Proctor
        run: |
          cd proctor
          nix develop .#proctor --command fr-proctor-build --base=/proctor/
          tar -czf ../franklyn-proctor-${{ needs.tag.outputs.version }}.tar.gz -C dist .

      - name: 📦 Upload Proctor Artifact
        uses: actions/upload-artifact@v5
        with:
          name: franklyn-proctor-${{ needs.tag.outputs.version }}
          path: franklyn-proctor-*.tar.gz
          compression-level: 0

  build-and-publish-docker-images:
    runs-on: ubuntu-latest
    name: 🐳 Build & Publish Docker Image
    needs:
      - tag
      - build-server
      - build-proctor
    permissions:
      packages: write
      attestations: write
      id-token: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository_owner }}/franklyn
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.tag.outputs.tag }}

      - name: ⚙️ Compute Docker Tags
        id: docker-tags
        run: |
          VERSION="${{ needs.tag.outputs.version }}"
          IS_DEV="${{ needs.tag.outputs.is_dev }}"
          IS_LTS="${{ needs.tag.outputs.is_lts }}"
          IMAGE_PREFIX="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"

          DOCKER_VERSION="${VERSION//+/-}"

          MAJOR_MINOR=""
          if [ "$IS_DEV" = "false" ] && [ "$IS_LTS" = "true" ]; then
            MAJOR_MINOR="$(echo "$DOCKER_VERSION" | sed -E 's/^([0-9]+\.[0-9]+).*$/\1/')"
          fi

          gen_tags() {
            local component="$1"
            local tags=""

            tags+="$IMAGE_PREFIX-$component:$DOCKER_VERSION"$'\n'

            if [ "$IS_DEV" = "true" ]; then
              tags+="$IMAGE_PREFIX-$component:dev"$'\n'
            else
              if [ "$IS_LTS" = "true" ]; then
                tags+="$IMAGE_PREFIX-$component:lts"$'\n'
                if [ -n "$MAJOR_MINOR" ]; then
                  tags+="$IMAGE_PREFIX-$component:$MAJOR_MINOR"$'\n'
                fi
              else
                tags+="$IMAGE_PREFIX-$component:latest"$'\n'
              fi
            fi

            echo -n "$tags"
          }

          SERVER_TAGS="$(gen_tags server)"
          PROCTOR_TAGS="$(gen_tags proctor)"

          echo "Server Images:\n$SERVER_TAGS\nProctor Images:\n$PROCTOR_TAGS"

          {
            echo "server_tags<<TAGS_EOF"
            echo "$SERVER_TAGS"
            echo "TAGS_EOF"

            echo "proctor_tags<<TAGS_EOF"
            echo "$PROCTOR_TAGS"
            echo "TAGS_EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        name: 📦 Download Server Artifact
        with:
          pattern: franklyn-server-*
          path: ./
          merge-multiple: true

      - uses: actions/download-artifact@v4
        name: 📦 Download Proctor Artifact
        with:
          pattern: franklyn-proctor-*
          path: ./
          merge-multiple: true

      - name: 🔑 Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐳 Build and Push Server
        uses: docker/build-push-action@v6
        id: push-server
        with:
          context: .
          file: ./server/src/main/docker/Dockerfile.ci
          push: true
          tags: ${{ steps.docker-tags.outputs.server_tags }}

      - name: 🔏 Generate Server Artifact Attestation
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-server
          subject-digest: ${{ steps.push-server.outputs.digest }}
          push-to-registry: true

      - name: 🐳 Build and Push Proctor
        uses: docker/build-push-action@v6
        id: push-proctor
        with:
          context: .
          file: ./proctor/docker/Dockerfile.ci
          push: true
          tags: ${{ steps.docker-tags.outputs.proctor_tags }}

      - name: 🔏 Generate Proctor Artifact Attestation
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-proctor
          subject-digest: ${{ steps.push-proctor.outputs.digest }}
          push-to-registry: true

  release:
    runs-on: ubuntu-latest
    name: 🎉 Release Artifacts

    needs:
      - tag
      - build-sentinel
      - build-sentinel-windows
      - build-server
      - build-proctor

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.tag.outputs.tag }}

      - uses: actions/download-artifact@v4
        name: 📦 Download All Artifacts
        with:
          pattern: franklyn-*
          path: artifacts/
          merge-multiple: true

      - name: ✏️ Generate Release Notes (non dev)
        id: notes_generation
        if: ${{ needs.tag.outputs.is_dev == 'false' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURRENT_TAG="${{ needs.tag.outputs.tag }}"
          REPO="${{ github.repository }}"

          echo "This is a Main Channel Release ($CURRENT_TAG)."

          git fetch --tags --prune

          PREVIOUS_STABLE_TAG=$(git tag -l "v*" | grep -vE '(-rc\.|\+dev\.|-dev\.)' | sort -V -r | grep -v "^$CURRENT_TAG$" | head -n 1)

          if [ -z "$PREVIOUS_STABLE_TAG" ]; then
            echo "::notice::No previous stable tag found. Notes will be generated from the beginning."
            PREVIOUS_TAG_ARG=""
          else
            echo "Found previous stable tag: $PREVIOUS_STABLE_TAG"
            PREVIOUS_TAG_ARG="-f previous_tag_name=$PREVIOUS_STABLE_TAG"
          fi

          RELEASE_NOTES=$(gh api \
            --method POST \
            /repos/$REPO/releases/generate-notes \
            -f tag_name="$CURRENT_TAG" \
            $PREVIOUS_TAG_ARG \
            --jq '.body')

          echo "notes<<RELEASE_NOTES_EOF" >> "$GITHUB_OUTPUT"
          echo "$RELEASE_NOTES" >> "$GITHUB_OUTPUT"
          echo "RELEASE_NOTES_EOF" >> "$GITHUB_OUTPUT"

      - name: 📝 Draft Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          tag_name: ${{ needs.tag.outputs.tag }}
          body: ${{ steps.notes_generation.outputs.notes }}
          generate_release_notes: ${{ needs.tag.outputs.is_dev == 'true' }}
          prerelease: ${{ needs.tag.outputs.is_dev == 'true' }}
          files: artifacts/*

