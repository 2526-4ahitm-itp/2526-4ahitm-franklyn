  publish-apt:
    runs-on: ubuntu-latest
    name: 📤 Publish to APT
    if: needs.tag.outputs.should_release == 'true'

    needs:
      - tag
      - build-sentinel

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: v${{ needs.tag.outputs.version }}

      - uses: actions/download-artifact@v4
        name: 📦 Download All Artifacts
        with:
          pattern: franklyn-sentinel-deb-*
          path: artifacts/
          merge-multiple: true
      
      - name: 🚀 Deploy Sentinel APT Package
        env:
          APTLY_AUTH: franklyn-admin:${{ secrets.FRANKLYN_APT_REPOSITORY_SECRET }}
          CHANNEL: ${{ needs.tag.outputs.channel }}
        run: |
          # Always deploy to dev; stable releases also deploy to stable
          SUITES="dev"
          if [ "$CHANNEL" = "stable" ]; then
            SUITES="stable dev"
          fi
          for suite in $SUITES; do
            for deb in ./artifacts/franklyn-sentinel*.deb; do
              ./scripts/deploy.sh -f "$deb" -d "$suite" -U "$APTLY_AUTH"
            done
          done
